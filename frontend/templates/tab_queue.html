<div class="card">
    <div class="header-controls" style="margin-bottom: 0;">
        <h3>Stuck Queue Messages</h3>
        <button type="button" class="outline icon-btn" @click="loadQueue()" title="Refresh Queue">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
        </button>
    </div>
    <p style="margin-top: 0;">Messages that failed upstream delivery are stored here securely for backoff retries. (Memory-only payloads where persistence is disabled will not appear here).</p>
    <table>
        <thead>
            <tr>
                <th>Timestamp</th>
                <th>Method</th>
                <th>Sender</th>
                <th>Subject</th>
                <th class="table-col-min">Retry Count</th>
                <th class="table-col-min">Next Attempt</th>
                <th>Last Error</th>
                <th class="table-col-min">Actions</th>
            </tr>
        </thead>
        <tbody>
            <template x-for="item in queueItems" :key="item.id">
                <tr>
                    <td class="table-col-min"><span class="time-display" x-text="formatTime(item.timestamp)" :title="getFullTime(item.timestamp)"></span></td>
                    <td class="table-col-min" style="text-transform: capitalize;" x-text="item.method"></td>
                    <td x-text="item.sender"></td>
                    <td x-text="item.title"></td>
                    <td class="table-col-min" style="text-align: center;" x-text="item.retry_count"></td>
                    <td class="table-col-min">
                        <div style="font-size: 0.85em; white-space: nowrap;">
                            <div x-show="item.last_attempt > 0">Failed: <span class="time-display" x-text="formatTime(item.last_attempt)" :title="getFullTime(item.last_attempt)"></span></div>
                            <div x-show="item.next_retry > 0">Retry: <span class="time-display" x-text="formatTime(item.next_retry)" :title="getFullTime(item.next_retry)"></span></div>
                        </div>
                    </td>
                    <td style="color: var(--danger-color); font-size: 0.85em;" x-text="item.last_error"></td>
                    <td class="table-col-min">
                        <div style="display: flex; gap: 0.5rem;">
                            <button type="button" class="warning icon-btn" @click="retryQueueItem(item.id)" title="Retry Now">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><polyline points="23 20 23 14 17 14"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path></svg>
                            </button>
                            <button type="button" class="outline danger icon-btn" @click="deleteQueueItem(item.id)" title="Delete from Queue">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    </td>
                </tr>
            </template>
            <tr x-show="queueItems.length === 0"><td colspan="8" style="text-align: center; opacity: 0.7; padding: 1.5rem;">No stuck messages in the queue.</td></tr>
        </tbody>
    </table>
</div>
