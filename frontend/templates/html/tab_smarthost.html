<div class="card" style="margin-bottom: 1.5rem;">
    <h3>Global Catch-All Fallback</h3>
    <div class="flex-row" style="margin-bottom: 1rem;">
        <div style="flex: 0 0 auto; max-width: 100%;">
            <label>Default Smarthost Alias</label>
            <select x-model="smartGlobals.alias" style="width: max-content; max-width: 100%; display: block; padding-right: 2rem;">
                <option value="">-- No Default Smarthost --</option>
                <template x-for="s in sortedSmarthostKeys" :key="s">
                    <option :value="s" x-text="s" :selected="smartGlobals.alias === s"></option>
                </template>
            </select>
        </div>
    </div>
    <div class="flex-row" style="gap: 1.5rem;">
        <label class="toggle-label"><div class="toggle-switch"><input type="checkbox" x-model="smartGlobals.disable_attachments"><span class="slider"></span></div> Disable Attachments</label>
        <label class="toggle-label"><div class="toggle-switch"><input type="checkbox" x-model="smartGlobals.force_plaintext"><span class="slider"></span></div> Force Plaintext Formatting</label>
    </div>
</div>

<div class="card">
    <div class="table-header-row" style="margin-top: 0;">
        <h3>Configured Smarthosts</h3>
        <button type="button" class="outline success icon-btn" @click="openSmarthostModal('add')" title="Add Smarthost">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        </button>
    </div>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th class="table-sort" @click="setSmarthostSort('alias')">Alias <span x-show="smarthostSortCol === 'alias'" x-text="smarthostSortDir === 1 ? '▲' : '▼'"></span></th>
                    <th class="table-sort" @click="setSmarthostSort('address')">Address <span x-show="smarthostSortCol === 'address'" x-text="smarthostSortDir === 1 ? '▲' : '▼'"></span></th>
                    <th class="table-sort table-col-min" @click="setSmarthostSort('starttls')">STARTTLS <span x-show="smarthostSortCol === 'starttls'" x-text="smarthostSortDir === 1 ? '▲' : '▼'"></span></th>
                    <th class="table-sort table-col-min" @click="setSmarthostSort('auth')">Auth <span x-show="smarthostSortCol === 'auth'" x-text="smarthostSortDir === 1 ? '▲' : '▼'"></span></th>
                    <th class="table-col-min">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr x-show="sortedSmarthosts.length === 0">
                    <td colspan="5" style="text-align: center; font-style: italic; opacity: 0.7; padding: 1.5rem;">No configured smarthosts. Click the green plus icon to provision.</td>
                </tr>
                <template x-for="s in sortedSmarthosts" :key="s.alias">
                    <tr>
                        <td><strong x-text="s.alias"></strong></td>
                        <td x-text="(s.hostname || '') + ':' + (s.port || 25)"></td>
                        <td class="table-col-min" style="text-align: center; vertical-align: middle;">
                            <svg x-show="s.starttls" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display: block; margin: 0 auto;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            <svg x-show="!s.starttls" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display: block; margin: 0 auto;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>
                        </td>
                        <td class="table-col-min" style="text-align: center; vertical-align: middle;">
                            <svg x-show="s.auth" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display: block; margin: 0 auto;"><polyline points="20 6 9 17 4 12"></polyline></svg>
                            <svg x-show="!s.auth" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display: block; margin: 0 auto;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </td>
                        <td class="table-col-min">
                            <div style="display: flex; gap: 0.5rem;">
                                <button type="button" class="outline icon-btn" @click="openSmarthostModal('edit', s.alias)" title="Modify Relay">
                                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                                </button>
                                <button type="button" class="outline danger icon-btn" @click="deleteSmarthost(s.alias)" title="Delete Smarthost">
                                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                </button>
                            </div>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>
</div>
