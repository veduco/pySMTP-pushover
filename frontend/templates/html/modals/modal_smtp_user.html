{% from "components.html" import modal_frame, secret_input %}

{% call modal_frame(open_model="modals.smtpUser.open", title_text="'Add SMTP User'") %}
    <div class="form-group" style="margin-bottom: 1rem;">
        <label>Username</label>
        <input type="text" x-model="modals.smtpUser.fields.name" placeholder="e.g. gateway_user" autocomplete="off" data-lpignore="true" data-bwignore="true" data-1p-ignore="true" style="width: 100%;">
    </div>
    <div class="form-group">
        <label>Password</label>
        {{ secret_input(value_model="modals.smtpUser.fields.password", show_model="modals.smtpUser.showToken") }}
    </div>

    <div x-show="modals.smtpUser.error" class="danger" style="color: var(--danger-color); font-weight: bold; margin-top: 1rem; font-size: 0.9rem;" x-text="modals.smtpUser.error"></div>

    <div style="display: flex; gap: 1rem; justify-content: space-between; align-items: center; margin-top: 1.5rem;">
        <button type="button" class="outline warning icon-btn" @click="modals.smtpUser.clear()" :disabled="!modals.smtpUser.isDirty" title="Reset Fields">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"></path><path d="M22 21H7"></path><path d="m5 11 9 9"></path></svg>
        </button>
        <div style="display: flex; gap: 1rem;">
            <button type="button" class="outline" @click="modals.smtpUser.open = false">Cancel</button>
            <button type="button" @click="saveSmtpUserModal()" :disabled="!canSaveSmtpUserModal">Save</button>
        </div>
    </div>
{% endcall %}
