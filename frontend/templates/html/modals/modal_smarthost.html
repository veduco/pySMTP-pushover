<div x-show="smarthostModal.open" class="modal-overlay" style="display: none;" x-transition @keydown.escape.window="smarthostModal.open = false">
    <div class="modal-content" @click.away="smarthostModal.open = false">
        <h3 style="margin-top: 0;" x-text="smarthostModal.mode === 'add' ? 'Add Smarthost' : 'Modify Relay for ' + smarthostModal.oldAlias"></h3>

        <div class="form-group" style="margin-bottom: 1rem;">
            <label>Alias Name</label>
            <input type="text" x-model="smarthostModal.alias" placeholder="e.g. gmail_relay" :disabled="smarthostModal.mode === 'edit'" autocomplete="off" data-lpignore="true" data-bwignore="true" data-1p-ignore="true" style="width: 100%;">
        </div>
        <div class="flex-row" style="margin-bottom: 1.5rem;">
            <div class="flex-col" style="flex: 2; min-width: 0;">
                <label>Hostname</label>
                <input type="text" x-model="smarthostModal.hostname" placeholder="smtp.gmail.com" autocomplete="off" data-lpignore="true" data-bwignore="true" data-1p-ignore="true" style="width: 100%;">
            </div>
            <div class="flex-col" style="flex: 1; min-width: 0;">
                <label>Port</label>
                <input type="number" x-model.number="smarthostModal.port" style="width: 100%;" oninput="if(this.value.length > 5) this.value = this.value.slice(0, 5);" min="1" max="65535">
            </div>
        </div>
        <div class="form-group" style="margin-bottom: 1.5rem;">
            <label>Advertised Hostname (EHLO)</label>
            <input type="text" x-model="smarthostModal.advertised_hostname" placeholder="Optional. Defaults to Global Hostname" autocomplete="off" data-lpignore="true" data-bwignore="true" data-1p-ignore="true" style="width: 100%;">
        </div>

        <div class="flex-row" style="gap: 1.5rem; margin-bottom: 1.5rem; align-items: center;">
            <label style="margin: 0; font-weight: bold; display: flex; align-items: center; gap: 0.5rem; cursor: pointer; transition: transform 0.1s ease;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                <input type="checkbox" x-model="smarthostModal.starttls" style="display: none;">
                <svg x-show="smarthostModal.starttls" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                <svg x-show="!smarthostModal.starttls" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>
                Use STARTTLS
            </label>
            <div x-show="smarthostModal.starttls" style="display: inline-block;">
                <label class="toggle-label"><div class="toggle-switch"><input type="checkbox" x-model="smarthostModal.disable_tls_validation"><span class="slider"></span></div> Disable TLS Verification</label>
            </div>
        </div>

        <div class="flex-row" style="gap: 1.5rem; margin-bottom: 1rem;">
            <label class="toggle-label"><div class="toggle-switch"><input type="checkbox" x-model="smarthostModal.disable_attachments"><span class="slider"></span></div> Disable Attachments</label>
            <label class="toggle-label"><div class="toggle-switch"><input type="checkbox" x-model="smarthostModal.force_plaintext"><span class="slider"></span></div> Force Plaintext Formatting</label>
        </div>

        <div class="form-group" style="margin-bottom: 1.5rem; margin-top: 0.5rem; border-top: 1px solid var(--border-color); padding-top: 1rem;">
            <label class="toggle-label" style="font-weight: bold;"><div class="toggle-switch"><input type="checkbox" x-model="smarthostModal.auth"><span class="slider"></span></div> Use Authentication</label>
        </div>

        <div x-show="smarthostModal.auth" style="margin-bottom: 1rem;" x-transition>
            <div class="form-group" style="margin-bottom: 1rem;">
                <label>Username</label>
                <input type="text" x-model="smarthostModal.username" placeholder="foo@gmail.com" autocomplete="off" data-lpignore="true" data-bwignore="true" data-1p-ignore="true" style="width: 100%;">
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="token-input" style="position: relative; display: block; width: 100%;">
                    <input :type="smarthostModal.showPass ? 'text' : 'password'" x-model="smarthostModal.password" :placeholder="smarthostModal.mode === 'edit' ? 'Leave blank to retain existing password.' : 'Password or App Password'" autocomplete="new-password" data-lpignore="true" data-bwignore="true" data-1p-ignore="true" style="width: 100%; padding-right: 30px; box-sizing: border-box;">
                    <div @click="smarthostModal.showPass = !smarthostModal.showPass" style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-color); opacity: 0.6; display: flex; align-items: center; justify-content: center; height: 100%;">
                        <svg x-show="!smarthostModal.showPass" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        <svg x-show="smarthostModal.showPass" style="display: none;" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                    </div>
                </div>
            </div>
        </div>

        <div x-show="smarthostModal.error" class="danger" style="color: var(--danger-color); font-weight: bold; margin-top: 1rem; font-size: 0.9rem;" x-text="smarthostModal.error"></div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem;">
            <button type="button" class="outline warning icon-btn" @click="clearSmarthostModal()" :disabled="!hasSmarthostModalChanges" title="Reset Fields">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"></path><path d="M22 21H7"></path><path d="m5 11 9 9"></path></svg>
            </button>
            <div style="display: flex; gap: 1rem;">
                <button type="button" class="outline" @click="smarthostModal.open = false">Cancel</button>
                <button type="button" @click="saveSmarthostModal()" :disabled="!canSaveSmarthostModal">Save Changes</button>
            </div>
        </div>
    </div>
</div>
