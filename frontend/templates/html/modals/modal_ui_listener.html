<div x-show="uiListenerModal.open" class="modal-overlay" style="display: none;" x-transition @keydown.escape.window="uiListenerModal.open = false">
    <div class="modal-content" @click.away="uiListenerModal.open = false">
        <h3 style="margin-top: 0;" x-text="uiListenerModal.mode === 'add' ? 'Add UI Listener' : 'Modify UI Listener'"></h3>

        <div class="flex-row" style="margin-bottom: 1rem;">
            <div class="flex-col" style="flex: 2; min-width: 0;">
                <label>Listen Address</label>
                <input type="text" x-model="uiListenerModal.ip" placeholder="0.0.0.0" autocomplete="off" data-lpignore="true" data-bwignore="true" data-1p-ignore="true" style="width: 100%;">
            </div>
            <div class="flex-col" style="flex: 1; min-width: 0;">
                <label>Port</label>
                <input type="number" x-model.number="uiListenerModal.port" style="width: 100%;" oninput="if(this.value.length > 5) this.value = this.value.slice(0, 5);" min="1" max="65535">
            </div>
        </div>

        <div style="margin-bottom: 1.5rem;">
            <label class="hover-scale" style="margin: 0; display: inline-flex; width: max-content; align-items: center; gap: 0.5rem; cursor: pointer;">
                <input type="checkbox" x-model="uiListenerModal.https" style="position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none;">
                <svg x-show="uiListenerModal.https" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="pointer-events: none;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                <svg x-show="!uiListenerModal.https" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="pointer-events: none;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>
                Enable HTTPS
            </label>
        </div>

        <div x-show="uiListenerModal.https" style="margin-top: 1rem;">
            <div class="form-group" style="margin-bottom: 0.5rem;"><label>TLS Cert File</label><input type="text" x-model="uiListenerModal.tls_cert" placeholder="Leave blank to auto-generate" autocomplete="off" data-lpignore="true" data-bwignore="true" data-1p-ignore="true" style="width: 100%;"></div>
            <div class="form-group" style="margin-bottom: 1rem;"><label>TLS Key File</label><input type="text" x-model="uiListenerModal.tls_key" placeholder="Leave blank to auto-generate" autocomplete="off" data-lpignore="true" data-bwignore="true" data-1p-ignore="true" style="width: 100%;"></div>
        </div>
        <span class="validation-error" x-show="uiListenerModal.error" x-text="uiListenerModal.error"></span>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem;">
            <button type="button" class="outline warning icon-btn" @click="clearUiListenerModal()" :disabled="!hasUiListenerModalChanges" title="Reset Fields">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"></path><path d="M22 21H7"></path><path d="m5 11 9 9"></path></svg>
            </button>
            <div style="display: flex; gap: 1rem;">
                <button type="button" class="outline" @click="uiListenerModal.open = false">Cancel</button>
                <button type="button" @click="saveUiListenerModal()" :disabled="!canSaveUiListenerModal">Save Changes</button>
            </div>
        </div>
    </div>
</div>
