<div x-show="vaultModal.open" class="modal-overlay" style="display: none;" x-transition @keydown.escape.window="vaultModal.open = false">
    <div class="modal-content" @click.away="vaultModal.open = false">
        <h3 style="margin-top: 0;" x-text="vaultModal.type === 'app' ? 'Add App Token' : 'Add User Key'"></h3>
        <div class="form-group" style="margin-bottom: 1rem;"><label>Alias Name</label><input type="text" x-model="vaultModal.name" placeholder="e.g. MyServer" autocomplete="off" data-lpignore="true" data-bwignore="true" data-1p-ignore="true" style="width: 100%;"></div>
        <div class="form-group">
            <label>Token Value</label>
            <div class="token-input" style="position: relative; display: inline-block;">
                <input :type="vaultModal.showToken ? 'text' : 'password'" x-model="vaultModal.token" maxlength="30" autocomplete="new-password" data-lpignore="true" data-bwignore="true" data-1p-ignore="true" style="width: 100%; padding-right: 30px; box-sizing: border-box;">
                <div @click="vaultModal.showToken = !vaultModal.showToken" style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-color); opacity: 0.6; display: flex; align-items: center; justify-content: center; height: 100%;">
                    <svg x-show="!vaultModal.showToken" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    <svg x-show="vaultModal.showToken" style="display: none;" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                </div>
            </div>
        </div>
        <div x-show="vaultModal.error" class="danger" style="color: var(--danger-color); font-weight: bold; margin-top: 1rem; font-size: 0.9rem;" x-text="vaultModal.error"></div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem;">
            <button type="button" class="outline warning icon-btn" @click="clearVaultModal()" :disabled="!hasVaultModalChanges" title="Reset Fields">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"></path><path d="M22 21H7"></path><path d="m5 11 9 9"></path></svg>
            </button>
            <div style="display: flex; gap: 1rem;">
                <button type="button" class="outline" @click="vaultModal.open = false">Cancel</button>
                <button type="button" @click="saveVaultModal()" :disabled="!canSaveVaultModal">Save</button>
            </div>
        </div>
    </div>
</div>
