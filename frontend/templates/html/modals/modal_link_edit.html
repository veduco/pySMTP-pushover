<div x-show="linkEditModal.open" class="modal-overlay" style="display: none;" x-transition @keydown.escape.window="linkEditModal.open = false">
    <div class="modal-content" @click.away="linkEditModal.open = false">
        <h3 style="margin-top: 0;">Link Management Settings</h3>
        <div class="flex-row" style="margin-bottom: 1.5rem;">
            <label class="toggle-label"><div class="toggle-switch"><input type="checkbox" x-model="linkEditModal.backend_remote"><span class="slider"></span></div> Connect via Remote API</label>
        </div>
        <div x-show="!linkEditModal.backend_remote" style="margin-bottom: 1rem;">
            <div class="form-group">
                <label>Local Configuration File Path</label>
                <input type="text" x-model="linkEditModal.local_config_path" placeholder="/opt/smtp-pushover/config.json" autocomplete="off" style="width: 100%;">
            </div>
        </div>
        <div x-show="linkEditModal.backend_remote" style="margin-bottom: 1rem;">
            <div class="form-group" style="margin-bottom: 1rem;">
                <label>Control API Address</label>
                <input type="text" x-model="linkEditModal.remote_url" placeholder="https://127.0.0.1:6443" autocomplete="off" style="width: 100%;">
            </div>
            <div class="form-group" style="margin-bottom: 1rem;">
                <label>API Bearer Secret</label>
                <div class="token-input" style="position: relative; display: block; width: 100%;">
                    <input :type="linkEditModal.showSecret ? 'text' : 'password'" x-model="linkEditModal.remote_secret" placeholder="Leave blank to retain existing secret." autocomplete="new-password" style="width: 100%; padding-right: 30px; box-sizing: border-box;">
                    <div @click="linkEditModal.showSecret = !linkEditModal.showSecret" style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-color); opacity: 0.6; display: flex; align-items: center; justify-content: center; height: 100%;">
                        <svg x-show="!linkEditModal.showSecret" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        <svg x-show="linkEditModal.showSecret" style="display: none;" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                    </div>
                </div>
            </div>
            <div class="flex-row">
                <label class="toggle-label"><div class="toggle-switch"><input type="checkbox" x-model="linkEditModal.remote_verify_tls"><span class="slider"></span></div> Verify TLS Certificate</label>
            </div>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem;">
            <button type="button" class="outline warning icon-btn" @click="clearLinkEditModal()" :disabled="!hasLinkModalChanges" title="Reset Changes">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"></path><path d="M22 21H7"></path><path d="m5 11 9 9"></path></svg>
            </button>
            <div style="display: flex; gap: 1rem;">
                <button type="button" class="outline" @click="linkEditModal.open = false">Cancel</button>
                <button type="button" @click="saveLinkEditModal()" :disabled="!canSaveLinkModal">Apply Context</button>
            </div>
        </div>
    </div>
</div>
