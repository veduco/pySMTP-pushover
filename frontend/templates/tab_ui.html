<style>
    .segment-label.compact {
        padding: 0.3rem 0;
        font-size: 0.75rem;
        letter-spacing: -0.2px;
    }
    .validation-error {
        color: var(--danger-color);
        font-size: 0.8rem;
        font-weight: bold;
        margin-top: 0.25rem;
        display: block;
    }
    .input-invalid {
        border-color: var(--danger-color) !important;
        box-shadow: 0 0 0 2px rgba(220, 53, 69, 0.2);
    }
</style>

<form hx-post="/save/ui"
      hx-target="#status"
      x-data="{
          tzError: '',
          validTimezones: [],
          init() {
              // Dynamically harvest the full, authoritative IANA database from the browser engine
              try {
                  this.validTimezones = Intl.supportedValuesOf('timeZone');
              } catch (e) {
                  // Fallback array if running in legacy client runtimes lacking Intl support
                  this.validTimezones = ['UTC', 'America/New_York', 'America/Chicago', 'America/Denver', 'America/Los_Angeles', 'Europe/London', 'Asia/Tokyo'];
              }
          },
          checkTimezone() {
              if (this.ui_tz && !this.validTimezones.includes(this.ui_tz)) {
                  this.tzError = 'Please select a valid timezone location from the list.';
                  return false;
              }
              this.tzError = '';
              return true;
          },
          validateAndSubmit(e) {
              if (!this.checkTimezone()) {
                  return;
              }
              htmx.trigger(e.target, 'submit');
          }
      }"
      @submit.prevent="validateAndSubmit($event)"
      @htmx:config-request.camel="$event.detail.parameters['ui_listeners_json'] = JSON.stringify(uiListeners);">

    <div class="card">
        <h3>Web UI Display Settings</h3>
        <div class="flex-row" style="margin-bottom: 1rem; align-items: flex-end;">
            <div class="flex-col" style="flex: 1; min-width: 250px; max-width: 100%;">
                <label style="margin-bottom: 0.25rem;">UI Log Level Severity</label>
                <div class="segment-track" style="width: 100%; display: flex;">
                    <div class="segment-thumb" :style="'width: calc(20% - 1.2px); background-color: ' + getLogLevelColor(ui_loglevel) + '; transform: translateX(' + (Math.max(0, ['DEBUG','INFO','WARNING','ERROR','CRITICAL'].indexOf(ui_loglevel)) * 100) + '%);'"></div>
                    <label class="segment-label compact" :style="ui_loglevel === 'DEBUG' ? 'color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.4);' : 'color: var(--text-color); opacity: 0.7;'"><input type="radio" x-model="ui_loglevel" value="DEBUG"> DEBUG</label>
                    <label class="segment-label compact" :style="ui_loglevel === 'INFO' ? 'color: #121212;' : 'color: var(--text-color); opacity: 0.7;'"><input type="radio" x-model="ui_loglevel" value="INFO"> INFO</label>
                    <label class="segment-label compact" :style="ui_loglevel === 'WARNING' ? 'color: #121212;' : 'color: var(--text-color); opacity: 0.7;'"><input type="radio" x-model="ui_loglevel" value="WARNING"> WARN</label>
                    <label class="segment-label compact" :style="ui_loglevel === 'ERROR' ? 'color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.4);' : 'color: var(--text-color); opacity: 0.7;'"><input type="radio" x-model="ui_loglevel" value="ERROR"> ERROR</label>
                    <label class="segment-label compact" :style="ui_loglevel === 'CRITICAL' ? 'color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.4);' : 'color: var(--text-color); opacity: 0.7;'"><input type="radio" x-model="ui_loglevel" value="CRITICAL"> CRIT</label>
                </div>
            </div>

            <div class="flex-col" style="flex: 1; min-width: 200px; padding-bottom: 2px;">
                <label>Display Timezone Location</label>
                <input type="text" name="timezone" x-model="ui_tz" @blur="checkTimezone()" @input="tzError = ''" :class="tzError ? 'input-invalid' : ''" list="timezone-list" placeholder="Search timezone... e.g. America/New_York" autocomplete="off" style="width: 100%;">
                <span class="validation-error" x-show="tzError" x-text="tzError" style="display: none;"></span>
                <datalist id="timezone-list">
                    <template x-for="tz in validTimezones" :key="tz"><option :value="tz"></option></template>
                </datalist>
            </div>

            <div class="flex-col" style="flex: 1; min-width: 200px;">
                <label style="margin-bottom: 0.25rem;">Date Format Syntax</label>
                <input type="hidden" name="date_format" x-model="ui_fmt">
                <div class="segment-track" style="width: 100%; display: flex;">
                    <div class="segment-thumb" :style="'width: calc(33.333% - 2px); transform: translateX(' + (Math.max(0, ['YYYY-MM-DD HH:mm:ss','MM/DD/YYYY hh:mm:ss A','DD/MM/YYYY HH:mm:ss'].indexOf(ui_fmt)) * 100) + '%);'"></div>
                    <label class="segment-label compact" :style="ui_fmt === 'YYYY-MM-DD HH:mm:ss' ? 'color: white;' : 'color: var(--text-color); opacity: 0.7;'"><input type="radio" x-model="ui_fmt" value="YYYY-MM-DD HH:mm:ss"> ISO</label>
                    <label class="segment-label compact" :style="ui_fmt === 'MM/DD/YYYY hh:mm:ss A' ? 'color: white;' : 'color: var(--text-color); opacity: 0.7;'"><input type="radio" x-model="ui_fmt" value="MM/DD/YYYY hh:mm:ss A"> US</label>
                    <label class="segment-label compact" :style="ui_fmt === 'DD/MM/YYYY HH:mm:ss' ? 'color: white;' : 'color: var(--text-color); opacity: 0.7;'"><input type="radio" x-model="ui_fmt" value="DD/MM/YYYY HH:mm:ss"> UK/EU</label>
                </div>
            </div>
        </div>

        <div class="flex-row" style="margin-bottom: 1.5rem;">
            <div class="flex-col" style="flex: 1; min-width: 200px;">
                <label style="margin-bottom: 0.25rem;">Token Default Sort</label>
                <input type="hidden" name="vault_sort" x-model="ui_vault_sort">
                <div style="display: flex; gap: 0.5rem;">
                    <button type="button" style="flex: 1; padding: 0.4rem; font-size: 0.85rem;"
                            :class="ui_vault_sort.startsWith('name') ? '' : 'outline'"
                            @click="ui_vault_sort = ui_vault_sort.startsWith('name') ? (ui_vault_sort === 'name_asc' ? 'name_desc' : 'name_asc') : 'name_asc'">
                        Alias Name <span style="margin-left: 0.25rem;" x-show="ui_vault_sort.startsWith('name')" x-text="ui_vault_sort.endsWith('asc') ? '▲' : '▼'"></span>
                    </button>
                    <button type="button" style="flex: 1; padding: 0.4rem; font-size: 0.85rem;"
                            :class="ui_vault_sort.startsWith('epoch') ? '' : 'outline'"
                            @click="ui_vault_sort = ui_vault_sort.startsWith('epoch') ? (ui_vault_sort === 'epoch_asc' ? 'epoch_desc' : 'epoch_asc') : 'epoch_asc'">
                        Last Mod <span style="margin-left: 0.25rem;" x-show="ui_vault_sort.startsWith('epoch')" x-text="ui_vault_sort.endsWith('asc') ? '▲' : '▼'"></span>
                    </button>
                </div>
            </div>

            <div class="flex-col" style="flex: 1; min-width: 200px;">
                <label style="margin-bottom: 0.25rem;">SMTP Users Default Sort</label>
                <input type="hidden" name="smtp_sort" x-model="ui_smtp_sort">
                <div style="display: flex; gap: 0.5rem;">
                    <button type="button" style="flex: 1; padding: 0.4rem; font-size: 0.85rem;"
                            :class="ui_smtp_sort.startsWith('name') ? '' : 'outline'"
                            @click="ui_smtp_sort = ui_smtp_sort.startsWith('name') ? (ui_smtp_sort === 'name_asc' ? 'name_desc' : 'name_asc') : 'name_asc'">
                        Username <span style="margin-left: 0.25rem;" x-show="ui_smtp_sort.startsWith('name')" x-text="ui_smtp_sort.endsWith('asc') ? '▲' : '▼'"></span>
                    </button>
                    <button type="button" style="flex: 1; padding: 0.4rem; font-size: 0.85rem;"
                            :class="ui_smtp_sort.startsWith('epoch') ? '' : 'outline'"
                            @click="ui_smtp_sort = ui_smtp_sort.startsWith('epoch') ? (ui_smtp_sort === 'epoch_asc' ? 'epoch_desc' : 'epoch_asc') : 'epoch_asc'">
                        Last Mod <span style="margin-left: 0.25rem;" x-show="ui_smtp_sort.startsWith('epoch')" x-text="ui_smtp_sort.endsWith('asc') ? '▲' : '▼'"></span>
                    </button>
                </div>
            </div>

            <div class="flex-col" style="flex: 1; min-width: 200px;">
                <label style="margin-bottom: 0.25rem;">Smarthost Default Sort</label>
                <input type="hidden" name="smarthost_sort" x-model="ui_smarthost_sort">
                <div style="display: flex; gap: 0.5rem;">
                    <button type="button" style="flex: 1; padding: 0.4rem; font-size: 0.85rem;"
                            @click="ui_smarthost_sort = ui_smarthost_sort === 'alias_asc' ? 'alias_desc' : 'alias_asc'">
                        Alias Name <span style="margin-left: 0.25rem;" x-text="ui_smarthost_sort.endsWith('asc') ? '▲' : '▼'"></span>
                    </button>
                </div>
            </div>
        </div>

        <div class="flex-row" style="gap: 1.5rem; margin-bottom: 0.5rem;">
            <label class="toggle-label"><div class="toggle-switch"><input type="checkbox" name="relative_time" x-model="ui_relative"><span class="slider"></span></div> Render Coerced Relative Human Times (e.g. '3 days ago')</label>
            <label class="toggle-label"><div class="toggle-switch"><input type="checkbox" name="expand_adv" x-model="ui_expand_adv"><span class="slider"></span></div> Always Expand Route Settings by Default</label>
        </div>
    </div>

    <div class="card">
        <h3>UI Network Listeners</h3>
        <table>
            <thead>
                <tr>
                    <th class="table-sort" style="width: auto;" @click="setUiListenerSort('bind')">Bind Address <span style="font-size: 0.8em;" x-show="uiListenerSortCol==='bind'" x-text="uiListenerSortDir===1 ? '▲' : '▼'"></span></th>
                    <th class="table-sort table-col-min" @click="setUiListenerSort('https')">HTTPS <span style="font-size: 0.8em;" x-show="uiListenerSortCol==='https'" x-text="uiListenerSortDir===1 ? '▲' : '▼'"></span></th>
                    <th>Dedicated TLS Cert File</th>
                    <th>Dedicated TLS Key File</th>
                    <th class="table-col-min">Actions</th>
                </tr>
            </thead>
            <tbody>
                <template x-for="l in sortedUiListeners" :key="l._idx">
                    <tr>
                        <td><strong x-text="l.bind"></strong></td>
                        <td class="table-col-min" style="text-align: center;">
                            <svg x-show="l.https" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                            <svg x-show="!l.https" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#ef4444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </td>
                        <td x-text="l.tls_cert || '-'"></td>
                        <td x-text="l.tls_key || '-'"></td>
                        <td class="table-col-min">
                            <div style="display: flex; gap: 0.5rem;">
                                <button type="button" class="outline" @click="openUiListenerModal('edit', l._idx)">Modify Listener</button>
                                <button type="button" class="danger" @click="uiListeners.splice(l._idx, 1)" title="Remove Listener"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
                            </div>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
        <div style="margin-top: 1rem;"><button type="button" @click="openUiListenerModal('add')">+ Add UI Listener</button></div>
    </div>

    <div style="margin-top: 1.5rem; display: flex; gap: 1rem;">
        <button type="submit" style="font-size: 1.1rem; padding: 1rem;">Save UI Transformations</button>
        <button type="button" class="warning" @click="window.location.reload()" style="font-size: 1.1rem; padding: 1rem;">Discard Changes & Reload from Disk</button>
    </div>
</form>
