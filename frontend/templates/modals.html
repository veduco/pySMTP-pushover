<div x-show="editModal.open" class="modal-overlay" style="display: none;" x-transition @keydown.escape.window="editModal.open = false">
    <div class="modal-content" @click.away="editModal.open = false">
        <h3 style="margin-top: 0;" x-text="editModal.type === 'smtp' ? 'Change Password for ' + editModal.name : 'Modify Secret for ' + editModal.name"></h3>
        <div class="form-group" style="max-width: 100%;">
            <label x-text="editModal.type === 'smtp' ? 'New Password' : 'New Token Value'"></label>
            <div class="token-input" style="position: relative; display: inline-block;">
                <input :type="editModal.showToken ? 'text' : 'password'" x-model="editModal.value" @keyup.enter="saveEditModal()" placeholder="Enter new hidden value..." autocomplete="new-password" data-lpignore="true" data-bwignore="true" data-1p-ignore="true" :maxlength="editModal.type === 'vault' ? 30 : 256" style="width: 100%; padding-right: 30px; box-sizing: border-box;">
                <div @click="editModal.showToken = !editModal.showToken" style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-color); opacity: 0.6; display: flex; align-items: center; justify-content: center; height: 100%;">
                    <svg x-show="!editModal.showToken" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    <svg x-show="editModal.showToken" style="display: none;" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                </div>
            </div>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem;">
            <button type="button" class="outline warning icon-btn" @click="clearEditModal()" :disabled="!hasEditModalChanges" title="Reset Field">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"></path><path d="M22 21H7"></path><path d="m5 11 9 9"></path></svg>
            </button>
            <div style="display: flex; gap: 1rem;">
                <button type="button" class="outline" @click="editModal.open = false">Cancel</button>
                <button type="button" @click="saveEditModal()" :disabled="!canSaveEditModal">Save Changes</button>
            </div>
        </div>
    </div>
</div>

                <input type="text" x-model="uiListenerModal.tls_cert" placeholder="Leave blank to use auto-generated cert" autocomplete="off" data-lpignore="true" data-bwignore="true" data-1p-ignore="true" style="width: 100%;">
            </div>
            <div class="form-group">
                <label>Dedicated TLS Key File</label>
                <input type="text" x-model="uiListenerModal.tls_key" placeholder="Leave blank to use auto-generated key" autocomplete="off" data-lpignore="true" data-bwignore="true" data-1p-ignore="true" style="width: 100%;">
            </div>
        </div>

        <div x-show="uiListenerModal.error" class="danger" style="color: var(--danger-color); font-weight: bold; margin-top: 1rem; font-size: 0.9rem;" x-text="uiListenerModal.error"></div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem;">
            <button type="button" class="outline warning icon-btn" @click="clearUiListenerModal()" :disabled="!hasUiListenerModalChanges" title="Reset Fields">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3h4a2 2 0 0 1 2 2v6H8V5a2 2 0 0 1 2-2z"></path><rect x="4" y="11" width="16" height="4" rx="1"></rect><path d="M6 15l-1 6"></path><path d="M10 15l-.5 6"></path><path d="M14 15l.5 6"></path><path d="M18 15l1 6"></path></svg>
            </button>
            <div style="display: flex; gap: 1rem;">
                <button type="button" class="outline" @click="uiListenerModal.open = false">Cancel</button>
                <button type="button" @click="saveUiListenerModal()" :disabled="!canSaveUiListenerModal">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<div x-show="diffModal.open" class="modal-overlay" style="display: none;" x-transition @keydown.escape.window="diffModal.open = false">
    <div class="modal-content" @click.away="diffModal.open = false" style="width: 650px;">
        <h3 style="margin-top: 0; border-bottom: 2px solid var(--primary-color); padding-bottom: 0.5rem;">Review Configuration Changes</h3>

        <p style="font-size: 0.9rem; margin-bottom: 1rem;">The following modifications will be committed to the server. Active connections may be temporarily paused for hot-reloads.</p>

        <table style="margin-bottom: 1.5rem;">
            <thead>
                <tr>
                    <th>Setting Block</th>
                    <th>Previous State</th>
                    <th>New State</th>
                    <th class="table-col-min" style="text-align: center;">Revert</th>
                </tr>
            </thead>
            <tbody>
                <template x-for="(change, index) in diffModal.changes" :key="change.key">
                    <tr>
                        <td><strong x-text="change.key"></strong></td>
                        <td style="color: var(--danger-color); text-decoration: line-through;" x-text="change.old"></td>
                        <td style="color: #10b981; font-weight: bold;" x-text="change.new"></td>
                        <td class="table-col-min" style="text-align: center;">
                            <button type="button" class="outline danger icon-btn" @click="revertChange(index)" title="Revert this specific change">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>

        <div style="display: flex; gap: 1rem; justify-content: flex-end;">
            <button type="button" class="outline" @click="diffModal.open = false">Cancel</button>
            <button type="button" class="warning" @click="discardAllChanges()">Discard All</button>
            <button type="button" @click="confirmSave()">Commit</button>
        </div>
    </div>
</div>
